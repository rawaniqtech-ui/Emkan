[build]
  command = "npm run build"
  publish = ".next"

# Netlify auto-installs @netlify/plugin-nextjs when it detects a Next.js
# project, so no explicit plugins block is needed.

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Cache the heavy static assets aggressively (frames + videos never change)
[[headers]]
  for = "/frames/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
