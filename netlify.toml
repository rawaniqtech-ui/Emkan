[build]
  command = "npm run build"
  publish = ".next"

# Explicit Next.js runtime — without this Netlify serves .next as a plain
# static folder and every route 404s. The plugin transforms .next into
# Netlify Functions + static assets automatically.
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Cache the heavy static assets aggressively (frames + videos never change)
[[headers]]
  for = "/frames/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
